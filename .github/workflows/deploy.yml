name: CD Pipeline (Deploy)

on:
  push:
    branches: [ main ]
  # Ensure CI passes first
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long,prefix=
            latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: REPO_NAME
          script: |
            cd /home/${{ secrets.SERVER_USER }}/statuspulse
            export GITHUB_REPOSITORY=$REPO_NAME
            ./scripts/deploy.sh ${{ github.sha }}

      - name: Send Discord Notification
        if: always()
        run: |
          if [ -z "${{ secrets.ALERT_WEBHOOK_URL }}" ]; then
            echo "ALERT_WEBHOOK_URL is missing, skipping notification."
          else
            STATUS="${{ job.status }}"
            COLOR=3066993
            if [ "$STATUS" = "success" ]; then COLOR=3066993; elif [ "$STATUS" = "failure" ]; then COLOR=15158332; fi
            
            curl -X POST -H "Content-Type: application/json" \
              -d '{
                "embeds": [{
                  "title": "Deployment Status: '"$STATUS"'",
                  "description": "**Repo:** ${{ github.repository }}\n**Commit:** ${{ github.sha }}\n**Actor:** ${{ github.actor }}",
                  "color": '"$COLOR"'
                }]
              }' "${{ secrets.ALERT_WEBHOOK_URL }}"
          fi
