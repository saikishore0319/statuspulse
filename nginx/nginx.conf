# Rate limiting zone
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=100r/m;

# 1. HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _; # Replace with your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS - Production Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _; # Replace with your domain

    # SSL Certificates (managed by Certbot)
    # Note: These paths will be valid once Certbot runs
    ssl_certificate /etc/letsencrypt/live/statuspulse1.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/statuspulse1.duckdns.org/privkey.pem;

    # Best Practice SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security Headers (Required by Task 6c)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        limit_req zone=mylimit burst=20 nodelay;
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://app:8000/docs;
    }
}
    }
}
